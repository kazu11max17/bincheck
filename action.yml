name: 'bincheck'
description: 'Fast binary security property checker for ELF and PE files. Checks RELRO, NX, PIE, Stack Canary, and more.'
author: 'kazu11max17'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  files:
    description: 'List of binary file paths (space or newline separated)'
    required: true
  format:
    description: 'Output format: table, json, or sarif'
    required: false
    default: 'table'
  strict:
    description: 'Fail the step if any security check does not pass'
    required: false
    default: 'false'
  version:
    description: 'bincheck version to install (e.g. "0.1.0"). Defaults to latest.'
    required: false
    default: ''
  sarif-upload:
    description: 'Automatically upload SARIF results to GitHub Code Scanning (requires format: sarif)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install bincheck
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
        RUNNER_PLATFORM: ${{ runner.os }}-${{ runner.arch }}
      run: |
        VERSION="$INPUT_VERSION"
        if [ -z "$VERSION" ]; then
          VERSION=$(curl -fsSL -H "Authorization: token ${GH_TOKEN}" \
            https://api.github.com/repos/kazu11max17/bincheck/releases/latest \
            2>/dev/null | grep '"tag_name"' | sed 's/.*"tag_name": *"//;s/".*//' || echo "")
        fi

        # Determine platform
        case "$RUNNER_PLATFORM" in
          Linux-X64)   TARGET="x86_64-unknown-linux-gnu" ; EXT="tar.gz" ;;
          macOS-X64)   TARGET="x86_64-apple-darwin"      ; EXT="tar.gz" ;;
          macOS-ARM64) TARGET="aarch64-apple-darwin"      ; EXT="tar.gz" ;;
          Windows-X64) TARGET="x86_64-pc-windows-msvc"   ; EXT="zip"    ;;
          *)           TARGET="" ;;
        esac

        INSTALLED=false
        if [ -n "$VERSION" ] && [ -n "$TARGET" ]; then
          BASE_URL="https://github.com/kazu11max17/bincheck/releases/download/${VERSION}"
          ARCHIVE="bincheck-${TARGET}.${EXT}"
          echo "Downloading bincheck from ${BASE_URL}/${ARCHIVE}"
          if curl -fsSL "${BASE_URL}/${ARCHIVE}" -o "$ARCHIVE" && \
             curl -fsSL "${BASE_URL}/${ARCHIVE}.sha256" -o "${ARCHIVE}.sha256"; then
            echo "Verifying checksum..."
            sha256sum -c "${ARCHIVE}.sha256"
            if [ "$EXT" = "tar.gz" ]; then
              tar xzf "$ARCHIVE"
            else
              unzip -o "$ARCHIVE"
            fi
            chmod +x bincheck 2>/dev/null || true
            mkdir -p "$HOME/.local/bin"
            mv bincheck "$HOME/.local/bin/" 2>/dev/null || sudo mv bincheck /usr/local/bin/
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            INSTALLED=true
          fi
        fi

        # Fallback to cargo install
        if [ "$INSTALLED" = "false" ]; then
          echo "Prebuilt binary not available, falling back to cargo install"
          if ! command -v cargo &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          if [ -n "$INPUT_VERSION" ]; then
            cargo install bincheck --version "$INPUT_VERSION"
          else
            cargo install bincheck
          fi
        fi

        bincheck --version

    - name: Run bincheck
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_STRICT: ${{ inputs.strict }}
      run: |
        FILES=$(echo "$INPUT_FILES" | tr '\n' ' ' | xargs)
        ARGS=""

        if [ "$INPUT_FORMAT" != "table" ]; then
          ARGS="$ARGS -f $INPUT_FORMAT"
        fi

        if [ "$INPUT_STRICT" = "true" ]; then
          ARGS="$ARGS --strict"
        fi

        if [ "$INPUT_FORMAT" = "sarif" ]; then
          bincheck $FILES $ARGS > bincheck-results.sarif
          cat bincheck-results.sarif
        else
          bincheck $FILES $ARGS
        fi

    - name: Upload SARIF to GitHub Code Scanning
      if: ${{ inputs.format == 'sarif' && inputs.sarif-upload == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: bincheck-results.sarif
        category: bincheck
