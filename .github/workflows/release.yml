name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: bincheck
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: bincheck
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: bincheck.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../../../bincheck-${{ matrix.target }}.zip ${{ matrix.artifact }}
          else
            tar czf ../../../bincheck-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          fi

      - name: Generate checksum
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            sha256sum bincheck-${{ matrix.target }}.zip > bincheck-${{ matrix.target }}.zip.sha256
          else
            sha256sum bincheck-${{ matrix.target }}.tar.gz > bincheck-${{ matrix.target }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: bincheck-${{ matrix.target }}
          path: bincheck-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: bincheck-*/bincheck-*
